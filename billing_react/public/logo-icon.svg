<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0118"/>
      <stop offset="100%" stop-color="#160332"/>
    </linearGradient>
    <linearGradient id="accG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>
    <linearGradient id="receiptG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ede6ff"/>
    </linearGradient>
    <filter id="rShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#863bff" flood-opacity="0.6"/>
    </filter>
    <clipPath id="circle">
      <circle cx="250" cy="250" r="250"/>
    </clipPath>
  </defs>

  <!-- Circular background (safe for profile picture cropping) -->
  <circle cx="250" cy="250" r="250" fill="url(#bgG)"/>

  <!-- Ambient glow -->
  <ellipse cx="110" cy="130" rx="130" ry="110" fill="#863bff" opacity="0.12"/>
  <ellipse cx="390" cy="370" rx="130" ry="110" fill="#47bfff" opacity="0.09"/>

  <!-- Receipt shape -->
  <path d="
    M 148 75
    L 352 75
    L 352 330
    L 342 343 L 332 330
    L 322 343 L 312 330
    L 302 343 L 292 330
    L 282 343 L 272 330
    L 262 343 L 252 330
    L 242 343 L 232 330
    L 222 343 L 212 330
    L 202 343 L 192 330
    L 182 343 L 172 330
    L 162 343 L 152 330
    L 148 330
    Z"
    fill="url(#receiptG)"
    filter="url(#rShadow)"
  />

  <!-- Fold corner -->
  <polygon points="315,75 352,75 352,112" fill="#c8a0f0" opacity="0.6"/>

  <!-- LB monogram inside receipt -->
  <!-- "L" -->
  <text x="210" y="250"
    fill="#863bff"
    font-family="Arial Black, Arial, sans-serif"
    font-size="120"
    font-weight="900">L</text>
  <!-- "B" -->
  <text x="270" y="250"
    fill="url(#accG)"
    font-family="Arial Black, Arial, sans-serif"
    font-size="120"
    font-weight="900">B</text>

  <!-- Receipt top label -->
  <text x="250" y="115"
    text-anchor="middle"
    fill="#9060c0"
    font-family="Arial, sans-serif"
    font-size="14"
    letter-spacing="2">LOCAL BILLING</text>

  <!-- Divider line in receipt -->
  <line x1="162" y1="270" x2="338" y2="270" stroke="#d4b8ff" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Small receipt lines below monogram -->
  <rect x="165" y="283" width="80" height="7" rx="3.5" fill="#c8a0f0" opacity="0.5"/>
  <rect x="255" y="283" width="80" height="7" rx="3.5" fill="#c8a0f0" opacity="0.5"/>

  <!-- App name below receipt -->
  <text x="250" y="415"
    text-anchor="middle"
    fill="white"
    font-family="Arial Black, Arial, sans-serif"
    font-size="52"
    font-weight="900"
    letter-spacing="2">LOCAL</text>

  <text x="250" y="462"
    text-anchor="middle"
    fill="url(#accG)"
    font-family="Arial, sans-serif"
    font-size="30"
    font-weight="300"
    letter-spacing="10">BILLING</text>

  <!-- Bottom accent line -->
  <rect x="165" y="473" width="170" height="2.5" rx="1.25" fill="url(#accG)" opacity="0.6"/>
</svg>