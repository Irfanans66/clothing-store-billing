[phases.setup]
nixPkgs = ["nodejs_20", "python311", "libjpeg", "zlib", "freetype", "libpng"]

[phases.install]
cmds = [
  "pip install -r billing_backend/requirements.txt"
]

[phases.build]
cmds = [
  "cd billing_react && npm install && npm run build",
  "cp -r billing_react/dist billing_backend/dist"
]

[start]
cmd = "cd billing_backend && uvicorn main:app --host 0.0.0.0 --port $PORT"